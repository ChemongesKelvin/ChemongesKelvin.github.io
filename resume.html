    <style>
        /* Specific styling for the PDF viewer container */
        .cv-container {
            width: 100%;

            border-radius: 10px;

        }
        
        .download-box {
            margin-top: 30px;
            text-align: center;
        }
    </style>

<body>
    <div class="hero-header">
        <div class="wrapper">

                <div class="logo">
                    <i class="fa-solid fa-k"></i>

                <nav>

                        <li><a href="index.html">Home</a></li>

                </div>

                <div class="cv-container">
                    <embed src="Resume/resume.pdf" type="application/pdf" width="100%" height="100%" />
